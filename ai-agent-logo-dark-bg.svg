<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0299e3" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" stroke="url(#ringGrad)" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Orbit ring segments -->
  <path d="M 100 12 A 88 88 0 0 1 188 100" stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 188 100 A 88 88 0 0 1 100 188" stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 100 188 A 88 88 0 0 1 12 100" stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 12 100 A 88 88 0 0 1 100 12" stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Orbital nodes -->
  <circle cx="148" cy="52" r="6" fill="#81d4fa" opacity="0.8"/>
  <circle cx="168" cy="130" r="6" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="62" cy="160" r="6" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="40" cy="60" r="6" fill="#4fc3f7" opacity="0.4"/>
  <!-- Central neural network -->
  <circle cx="100" cy="100" r="48" fill="url(#nodeGrad)" opacity="0.12"/>
  <circle cx="100" cy="72" r="8" fill="url(#nodeGrad)"/>
  <circle cx="78" cy="98" r="8" fill="url(#nodeGrad)"/>
  <circle cx="122" cy="98" r="8" fill="url(#nodeGrad)"/>
  <circle cx="88" cy="130" r="8" fill="url(#nodeGrad)"/>
  <circle cx="112" cy="130" r="8" fill="url(#nodeGrad)"/>
  <line x1="100" y1="72" x2="78" y2="98" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="72" x2="122" y2="98" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="78" y1="98" x2="88" y2="130" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="122" y1="98" x2="112" y2="130" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="88" y1="130" x2="112" y2="130" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="78" y1="98" x2="122" y2="98" stroke="url(#glowGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="88" y1="130" x2="100" y2="72" stroke="url(#glowGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="112" y1="130" x2="100" y2="72" stroke="url(#glowGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <circle cx="100" cy="82" r="2" fill="#e1f5fe" opacity="0.8"/>
  <circle cx="84" cy="110" r="2" fill="#e1f5fe" opacity="0.6"/>
  <circle cx="116" cy="110" r="2" fill="#e1f5fe" opacity="0.6"/>
  <circle cx="100" cy="100" r="3" fill="#e1f5fe" opacity="0.6"/>
</svg>
